<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Code Share</title>
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1e1e1e; color: white; }
        textarea { width: 100%; height: 70vh; background: #2d2d2d; color: #fff; padding: 15px; border: 1px solid #444; border-radius: 5px; font-family: monospace; font-size: 16px; box-sizing: border-box; }
        h2 { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Live Code Editor (Syncs Globally)</h2>
    <textarea id="editor" placeholder="Yahan kuch bhi type karein... phone ya dusre tab me live dikhega!"></textarea>

    <script>
        // !! ZAROORI !! : console.firebase.google.com se apna config yahan dalein
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const editor = document.getElementById('editor');

        // Database se live data lena
        database.ref('liveCode/').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data && editor.value !== data.text) {
                editor.value = data.text;
            }
        });

        // Type karte hi database me save karna
        editor.addEventListener('input', (e) => {
            database.ref('liveCode/').set({ text: e.target.value });
        });
    </script>
</body>
</html>
